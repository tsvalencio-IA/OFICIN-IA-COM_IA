<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Checklist Padrão Concessionária • OFICIN-IA</title>
  <meta name="theme-color" content="#0f172a">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="./js/config.js"></script>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--card2:#f1f5f9;--text:#0f172a;--muted:#64748b;--line:#dbe4f0;--brand:#2563eb;--ok:#16a34a;--warn:#d97706;--bad:#dc2626;--na:#475569;--shadow:0 10px 28px rgba(15,23,42,.10);--r:18px;--tap:48px}
    [data-theme="dark"]{--bg:#07111f;--card:#0f1b2d;--card2:#101f34;--text:#e5eefc;--muted:#9fb0c7;--line:#23344f;--brand:#60a5fa;--shadow:0 14px 34px rgba(0,0,0,.32)}
    *{box-sizing:border-box;min-width:0} html,body{margin:0;max-width:100%;min-height:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.35}
    button,input,textarea,select{font:inherit} .app{width:100%;max-width:900px;margin:0 auto;padding:10px 10px 92px;overflow-x:hidden}.top{position:sticky;top:0;z-index:20;margin:-10px -10px 8px;padding:10px;background:linear-gradient(180deg,var(--bg) 86%,rgba(0,0,0,0));backdrop-filter:blur(10px)}
    .hero{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;padding:12px}.hero h1{margin:0;font-size:1.04rem;letter-spacing:-.02em}.sub{font-size:.78rem;color:var(--muted);margin-top:3px}.btn{border:0;background:var(--brand);color:#fff;border-radius:14px;min-height:var(--tap);padding:11px 14px;font-weight:950;cursor:pointer;touch-action:manipulation}.btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)}.btn.ok{background:var(--ok)}.btn.warn{background:var(--warn)}.btn.bad{background:var(--bad)}.btn:active{transform:scale(.99)}
    .steps{display:flex;gap:6px;margin-top:8px}.step{height:8px;flex:1;border-radius:99px;background:var(--line)}.step.on{background:var(--brand)}.card{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--r);padding:12px;margin-bottom:10px;overflow:hidden;max-width:100%}.title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}.title h2{font-size:1rem;margin:0}.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;background:var(--card2);border:1px solid var(--line);font-weight:900;font-size:.76rem;color:var(--text)}
    label{display:block;margin:0 0 4px;font-size:.76rem;font-weight:900;color:var(--muted)}.inp,textarea{width:100%;max-width:100%;min-height:var(--tap);border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:14px;padding:11px;outline:none}textarea{min-height:86px;resize:vertical}.inp:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15)}.row2,.row3{display:grid;grid-template-columns:1fr;gap:8px}@media(min-width:680px){.row2{grid-template-columns:1fr 1fr}.row3{grid-template-columns:1fr 1fr 1fr}}@media(max-width:420px){.hero{grid-template-columns:1fr}.btn{width:100%}}
    .symptoms{display:grid;grid-template-columns:1fr 1fr;gap:8px}.symptom{min-height:64px;border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:16px;padding:10px;display:flex;align-items:center;text-align:left;gap:9px;font-weight:950}.symptom.active{border-color:var(--brand);background:rgba(37,99,235,.12);outline:2px solid rgba(37,99,235,.16)}.draw{font-size:1.45rem;line-height:1;flex:0 0 auto}.notice,.hist-card{border:1px solid var(--line);background:var(--card2);border-radius:14px;padding:10px;color:var(--text);font-size:.86rem}.notice.warn{border-color:rgba(217,119,6,.35);background:rgba(217,119,6,.10)}.hist-card{border-left:4px solid var(--brand)}
    .search-stick{position:sticky;top:94px;z-index:15;background:var(--bg);padding:0 0 8px}.sec{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:8px 0;overflow:hidden}.sec summary{list-style:none;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:1000;cursor:pointer}.sec summary::-webkit-details-marker{display:none}.sec small{font-size:.72rem;color:var(--muted);white-space:nowrap}.hint{color:var(--muted);font-size:.78rem;padding:0 12px 10px}.items{display:grid;gap:8px;padding:0 10px 10px}.item{border:1px solid var(--line);background:var(--card2);border-radius:16px;padding:10px;display:grid;gap:8px;overflow:hidden}.item-head{display:grid;grid-template-columns:38px 1fr;gap:8px;align-items:start}.item-icon{width:36px;height:36px;display:grid;place-items:center;border-radius:12px;background:var(--card);border:1px solid var(--line);font-size:1.2rem}.mini{font-size:.75rem;color:var(--muted)}.hist{border-left:4px solid var(--brand);background:var(--card);border-radius:12px;padding:8px;font-size:.8rem}.hist.empty{border-left-color:var(--line);color:var(--muted)}
    .status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}@media(min-width:520px){.status-grid{grid-template-columns:repeat(4,1fr)}}.status-grid button{min-height:42px;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;font-weight:950}.status-grid button.on.ok{background:rgba(22,163,74,.15);border-color:var(--ok);color:var(--ok)}.status-grid button.on.warn{background:rgba(217,119,6,.15);border-color:var(--warn);color:var(--warn)}.status-grid button.on.bad{background:rgba(220,38,38,.15);border-color:var(--bad);color:var(--bad)}.status-grid button.on.na{background:rgba(71,85,105,.15);border-color:var(--na);color:var(--na)}.obs{min-height:62px;font-size:.9rem}.item-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}.filebtn{display:inline-flex!important;align-items:center;justify-content:center;min-height:42px;padding:8px 12px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-weight:950;color:var(--text);margin:0!important}.photo-count{font-size:.78rem;color:var(--muted)}.sug-title{font-size:.76rem;font-weight:950;color:var(--muted);margin-bottom:4px}.sug{border:1px dashed var(--brand);background:rgba(37,99,235,.08);color:var(--text);border-radius:12px;min-height:38px;padding:8px 10px;margin:3px 3px 0 0;font-weight:900;text-align:left}
    .photo-grid{display:grid;grid-template-columns:1fr;gap:8px}.photo{display:grid;grid-template-columns:86px 1fr;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:8px}.photo img{width:86px;height:72px;object-fit:cover;border-radius:10px}.photo button{margin-top:6px;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:10px;padding:7px;font-weight:900}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center}.kpi b{font-size:1.25rem;display:block}.resume-line{display:grid;grid-template-columns:1fr auto;gap:8px;border-bottom:1px dashed var(--line);padding:9px 0}.resume-line span{display:block;color:var(--muted);font-size:.78rem}.resume-line strong{font-size:.74rem;border-radius:999px;padding:6px 8px;align-self:start}.resume-line strong.warn{background:rgba(217,119,6,.15);color:var(--warn)}.resume-line strong.bad{background:rgba(220,38,38,.15);color:var(--bad)}.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}.hidden{display:none!important}
    .bottom{position:fixed;left:0;right:0;bottom:0;z-index:25;background:rgba(245,247,251,.90);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px max(10px,env(safe-area-inset-left)) calc(10px + env(safe-area-inset-bottom))}[data-theme="dark"] .bottom{background:rgba(7,17,31,.9)}.bottom-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8px}.toast{position:fixed;left:10px;right:10px;bottom:88px;z-index:50;background:var(--text);color:var(--bg);border-radius:14px;padding:12px 14px;display:none;font-weight:950;box-shadow:var(--shadow);max-width:900px;margin:auto}.toast.show{display:block}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="hero">
      <div><h1>Checklist Padrão Concessionária</h1><div class="sub">Histórico por placa, desenhos, fotos, áudio e relatório para O.S.</div></div>
      <button class="btn secondary" id="btnTheme" type="button">🌗 Tema</button>
    </div>
    <div class="steps"><div class="step on"></div><div class="step"></div><div class="step"></div><div class="step"></div></div>
  </div>

  <section class="card" id="screenStart">
    <div class="title"><h2>1) Começar avaliação</h2><span class="pill">📱 sem rolagem lateral</span></div>
    <div class="row2">
      <div><label>Placa</label><input id="placa" class="inp" maxlength="8" placeholder="ABC1D23" autocomplete="off"></div>
      <div><label>O.S. / Prisma / Referência</label><input id="osRef" class="inp" placeholder="Opcional"></div>
    </div>
    <div class="row2" style="margin-top:8px">
      <div><label>Mecânico</label><input id="mecanico" class="inp" placeholder="Nome do técnico"></div>
      <div><label>KM atual</label><input id="km" class="inp" inputmode="numeric" placeholder="Ex: 154320"></div>
    </div>
    <div style="display:grid;gap:8px;margin-top:10px">
      <button class="btn" id="btnBuscarPlaca" type="button">🔎 Buscar histórico da placa</button>
      <button class="btn secondary" id="btnComecar" type="button">Começar checklist</button>
    </div>
    <div id="historicoResumo" style="margin-top:10px"></div>
  </section>

  <section class="card hidden" id="screenCheck">
    <div class="title"><h2>2) Toque no problema</h2><span class="pill"><span id="selCount">0</span> críticos</span></div>
    <div class="symptoms" id="symptoms"></div>
    <div class="search-stick" style="margin-top:10px"><input id="buscaItem" class="inp" placeholder="🔍 Pesquisar item: lâmpada, borracha, pastilha, fechadura..."></div>
    <div id="groups"></div>
  </section>

  <section class="card hidden" id="screenMidia">
    <div class="title"><h2>3) Comentários, áudio e fotos</h2><span class="pill">📷 PDF</span></div>
    <label>Relato do cliente / reclamação</label><textarea id="relato" placeholder="Ex: cliente relata barulho ao passar em lombada..."></textarea>
    <label style="margin-top:8px">Diagnóstico técnico interno</label><textarea id="diagnostico" placeholder="Conclusão do mecânico, testes realizados, recomendações..."></textarea>
    <div class="row2" style="margin-top:8px">
      <button class="btn secondary" id="btnDitar" type="button">🗣️ Ditar texto</button>
      <button class="btn secondary" id="btnAudio" type="button">🎤 Gravar áudio</button>
    </div>
    <div id="audioBox" style="margin-top:8px"></div>
    <div style="margin-top:10px"><label class="filebtn">📷 Anexar fotos gerais <input id="fotoGeral" type="file" accept="image/*" capture="environment" multiple hidden></label></div>
    <div class="photo-grid" id="photoGrid" style="margin-top:10px"></div>
  </section>

  <section class="card hidden" id="screenResumo">
    <div class="title"><h2>4) Relatório final</h2><span class="pill">⬇️ baixar/importar</span></div>
    <div class="kpis">
      <div class="kpi"><b id="kTrocar">0</b><span>Trocar</span></div>
      <div class="kpi"><b id="kAtencao">0</b><span>Atenção</span></div>
      <div class="kpi"><b id="kOk">0</b><span>OK</span></div>
      <div class="kpi"><b id="kFotos">0</b><span>Fotos</span></div>
    </div>
    <div id="resumoLista" style="margin-top:10px"></div>
    <div style="display:grid;gap:8px;margin-top:12px">
      <button class="btn ok" id="btnSalvar" type="button">✅ Salvar checklist</button>
      <button class="btn" id="btnPDF" type="button">📄 Baixar PDF com fotos</button>
      <button class="btn secondary" id="btnXLSX" type="button">📊 Baixar planilha</button>
      <button class="btn secondary" id="btnJSON" type="button">⬇️ Baixar arquivo para importar na O.S.</button>
      <button class="btn warn" id="btnImportOS" type="button">📎 Enviar/Anexar na O.S. do Jarvis</button>
    </div>
  </section>
</div>

<div class="bottom">
  <div class="bottom-inner">
    <button class="btn secondary" id="btnVoltarCheck" type="button">⬅️ Voltar</button>
    <button class="btn" id="btnNextMidia" type="button">Avançar ➜</button>
    <button class="btn secondary hidden" id="btnVoltarMidia" type="button">⬅️ Fotos</button>
    <button class="btn ok" id="btnResumo" type="button">Finalizar ✅</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="./js/checklist.js?v=20260623v2"></script>
<script>
(function(){
  const a=document.getElementById('btnVoltarCheck'), b=document.getElementById('btnNextMidia'), c=document.getElementById('btnVoltarMidia'), d=document.getElementById('btnResumo');
  function upd(){const mid=!document.getElementById('screenMidia').classList.contains('hidden'), res=!document.getElementById('screenResumo').classList.contains('hidden'); a.classList.toggle('hidden',res); b.classList.toggle('hidden',mid||res); c.classList.toggle('hidden',!res); d.classList.toggle('hidden',res);} setInterval(upd,400);
})();
</script>
</body>
</html>
